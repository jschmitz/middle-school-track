<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a1a2e"/>

  <!-- Running track oval (outer) -->
  <ellipse cx="32" cy="36" rx="22" ry="14" fill="none" stroke="#e94560" stroke-width="3.5"/>
  <!-- Running track oval (inner lane line) -->
  <ellipse cx="32" cy="36" rx="15" ry="8" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Running figure -->
  <!-- Head -->
  <circle cx="32" cy="13" r="4" fill="#fff"/>
  <!-- Body -->
  <line x1="32" y1="17" x2="30" y2="26" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Back arm -->
  <line x1="30" y1="20" x2="24" y2="23" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Front arm -->
  <line x1="30" y1="20" x2="36" y2="17" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Back leg -->
  <line x1="30" y1="26" x2="24" y2="31" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="24" y1="31" x2="26" y2="36" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Front leg -->
  <line x1="30" y1="26" x2="36" y2="29" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="29" x2="38" y2="23" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
</svg>
