name: Build and Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/vaders-track

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log build context
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "======= Build Context ======="
          echo "Commit SHA   : $GITHUB_SHA"
          echo "Ref          : $GITHUB_REF"
          echo "Actor        : $GITHUB_ACTOR"
          echo "Repository   : $GITHUB_REPOSITORY"
          echo "Runner OS    : $RUNNER_OS"
          echo "Workflow     : $GITHUB_WORKFLOW"
          echo "Run ID       : $GITHUB_RUN_ID"
          echo "Run number   : $GITHUB_RUN_NUMBER"
          echo "DockerHub user (masked): XXXXXX${DOCKERHUB_USERNAME: -4}"
          echo "Image name   : $IMAGE_NAME"
          echo "Image tag    : $IMAGE_NAME:$GITHUB_SHA"
          echo "============================="

      - name: Log Docker login attempt
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "======= Docker Login ======="
          echo "Registry     : docker.io (Docker Hub)"
          echo "Token (masked): XXXXXXXXXXXXXX${DOCKERHUB_TOKEN: -4}"
          echo "Attempting login..."
          echo "============================"

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log post-login status
        run: echo "Docker login succeeded."

      - name: Log build and push details
        run: |
          echo "======= Docker Build ======="
          echo "Build context: ."
          echo "Push enabled : true"
          echo "Tags:"
          echo "  - $IMAGE_NAME:latest"
          echo "  - $IMAGE_NAME:$GITHUB_SHA"
          echo "Dockerfile location: ./Dockerfile"
          echo "============================"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log post-build status
        run: |
          echo "======= Build Complete ======="
          echo "Image pushed successfully."
          echo "Tags pushed:"
          echo "  - $IMAGE_NAME:latest"
          echo "  - $IMAGE_NAME:$GITHUB_SHA"
          echo "=============================="

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate SSH key and extract public key
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          echo "======= SSH Key Validation ======="

          if [[ -z "$DROPLET_SSH_KEY" ]]; then
            echo "ERROR: DROPLET_SSH_KEY secret is empty or not set"
            exit 1
          fi

          echo "Key length   : ${#DROPLET_SSH_KEY} chars"
          echo "Key prefix   : ${DROPLET_SSH_KEY:0:30}..."

          KEYFILE=$(mktemp)
          echo "$DROPLET_SSH_KEY" > "$KEYFILE"
          chmod 600 "$KEYFILE"

          if grep -q "BEGIN" "$KEYFILE"; then
            echo "Key header   : FOUND ($(grep 'BEGIN' "$KEYFILE"))"
          else
            echo "ERROR: Key header (-----BEGIN ...) not found — key may be malformed"
            exit 1
          fi

          if grep -q "END" "$KEYFILE"; then
            echo "Key footer   : FOUND"
          else
            echo "ERROR: Key footer (-----END ...) not found — key may be truncated"
            exit 1
          fi

          echo ""
          echo "Derived public key (add to droplet ~/.ssh/authorized_keys if missing):"
          echo "---"
          ssh-keygen -y -f "$KEYFILE" || echo "ERROR: ssh-keygen could not derive public key — key may be corrupt or passphrase-protected"
          echo "---"

          rm -f "$KEYFILE"
          echo "==================================="

      - name: Log deploy context
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
        run: |
          echo "======= Deploy Context ======="
          echo "Commit SHA      : $GITHUB_SHA"
          echo "Image to deploy : $IMAGE_NAME:latest"
          echo "Target host (masked): XXXXXX${DROPLET_HOST: -4}"
          echo "SSH user (masked)   : XX${DROPLET_USER: -2}"
          echo "SSH key present     : $([[ -n "$DROPLET_SSH_KEY" ]] && echo YES || echo NO)"
          echo "SSH key (masked)    : XXXXXXXXXXXXXX${DROPLET_SSH_KEY: -4}"
          echo "SSH key length      : ${#DROPLET_SSH_KEY} chars"
          echo "Deploy path         : /opt/vaders-track"
          echo "Container port      : 8081 -> 80"
          echo "=============================="

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_NAME
          script: |
            set -e

            echo "======= Remote: Session Info ======="
            echo "Hostname     : $(hostname)"
            echo "User         : $(whoami)"
            echo "Date (UTC)   : $(date -u)"
            echo "Uptime       : $(uptime)"
            echo "===================================="

            echo "======= Remote: Disk & Memory ======="
            df -h /
            free -h
            echo "======================================"

            echo "--- Creating deploy directory ---"
            mkdir -p /opt/vaders-track
            cd /opt/vaders-track
            echo "Working directory: $(pwd)"

            echo "--- Writing docker-compose.yml ---"
            cat > docker-compose.yml << COMPOSE
            services:
              web:
                image: ${IMAGE_NAME}:latest
                ports:
                  - "8081:80"
                restart: unless-stopped
            COMPOSE
            echo "docker-compose.yml written:"
            cat docker-compose.yml

            echo "--- Pulling latest image ---"
            echo "Image: ${IMAGE_NAME}:latest"
            docker pull ${IMAGE_NAME}:latest
            echo "Pull complete."

            echo "--- Current running containers (before deploy) ---"
            docker ps --format "table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}" || true

            echo "--- Running docker compose up ---"
            docker compose up -d
            echo "Compose up complete."

            echo "--- Current running containers (after deploy) ---"
            docker ps --format "table {{.ID}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo "--- Pruning unused images ---"
            docker image prune -f
            echo "Prune complete."

            echo "--- Docker image list ---"
            docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}\t{{.CreatedAt}}\t{{.Size}}"

            echo "======= Remote: Deploy complete ======="
            echo "Deployed at: $(date -u)"
            echo "========================================"
